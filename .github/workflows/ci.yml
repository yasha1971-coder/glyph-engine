name: ci

on:
  push:
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn requests

      - name: Basic import test
        run: |
          python -c "import glyph_http_server"
          python -c "import glyph_cli"
          echo "Imports OK"

      - name: Check build tools
        run: |
          cmake --version
          g++ --version
          xxd -h || true

      - name: Build FM binaries
        run: |
          cmake -S . -B build
          cmake --build build -j2

      - name: Build mini fixture index
        run: |
          ./examples/mini/build_mini.sh

      - name: Run correctness regression suite
        run: |
          ./tests/run_tests.sh
          